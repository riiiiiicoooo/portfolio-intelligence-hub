version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pih-postgres
    ports:
      - "5432:6432"
    environment:
      POSTGRES_USER: supabase
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supabase"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pih-network

  redis:
    image: redis:7-alpine
    container_name: pih-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pih-network

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pih-fastapi
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://supabase:postgres@postgres:5432/postgres
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - pih-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  pih-network:
    driver: bridge
